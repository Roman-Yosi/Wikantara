<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wikantara - Ensiklopedia Bebas Nusantara</title>

<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <div class="logo">Wikantara</div>
    <div class="subtitle">Ensiklopedia Bebas Nusantara</div>

    <input
        type="text"
        id="searchInput"
        placeholder="Cari tokoh, artis, musisi, ilmuwan..."
        class="search"
    >
</header>

<div class="container">

    <div class="card">

        <h1>Selamat Datang di Wikantara</h1>

        <p>
            Wikantara adalah ensiklopedia bebas yang memuat
            biografi tokoh dunia, artis, musisi, ilmuwan,
            atlet, politikus, dan berbagai artikel pengetahuan.
        </p>

        <h2>Daftar Tokoh</h2>

        <ul id="figureList">
            <li>Memuat data...</li>
        </ul>

    </div>

</div>

<footer>
    © 2026 Wikantara
</footer>

<script>
let semuaTokoh = [];

fetch("figures.json")
.then(response => response.json())
.then(data => {

    semuaTokoh = data;

    tampilkanTokoh(data);

});

function tampilkanTokoh(data){

    const list = document.getElementById("figureList");

    list.innerHTML = "";

    data.forEach(tokoh => {

        list.innerHTML += `
            <li>
                <a href="figure.html?id=${tokoh.id}">
                    ${tokoh.name}
                </a>
            </li>
        `;

    });

}

document.getElementById("searchInput")
.addEventListener("keyup", function(){

    const keyword = this.value.toLowerCase();

    const hasil = semuaTokoh.filter(tokoh =>
        tokoh.name.toLowerCase().includes(keyword)
    );

    tampilkanTokoh(hasil);

});
</script>

</body>
</html>
